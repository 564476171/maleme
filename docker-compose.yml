services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maleme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run ./deploy.sh first}
      POSTGRES_DB: ${POSTGRES_DB:-maleme}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Run ./deploy.sh first}
      APP_SECRET: ${APP_SECRET:?Run ./deploy.sh first}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Run ./deploy.sh first}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${APP_PORT:-6088}:3000'

volumes:
  postgres-data:
