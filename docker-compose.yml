services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maleme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-maleme}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maleme}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-maleme}?schema=public
      APP_SECRET: ${APP_SECRET:-}
      APP_SECRET_FILE: /data/app-secret
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before running docker compose up}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${APP_PORT:-6088}:3000'
    volumes:
      - app-data:/data

volumes:
  app-data:
  postgres-data:
